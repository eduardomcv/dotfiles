# Shell
shell /bin/zsh
shell_integration enabled

# Font
font_family      family=Iosevka postscript_name=Iosevka-Medium
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        16.0

# Cursor
cursor_shape           block
cursor_blink_interval  0

# Mouse
wheel_scroll_multiplier 0.95

# Bell
enable_audio_bell no

# Window
initial_window_width  130c
initial_window_height 40c
hide_window_decorations no
confirm_os_window_close 0

# macOS
macos_titlebar_style tabs
macos_option_as_alt  left

# Tab bar
tab_bar_style     powerline

# Layouts (enable splits)
enabled_layouts splits,stack


# Allow remote control. Required for vim-kitty-navigation.
#
# For linux only:
# allow_remote_control yes
# listen_on unix:@mykitty
#
# Other unix systems:
allow_remote_control yes
listen_on unix:/tmp/mykitty

# Tabs
map ctrl+a>c  					new_tab_with_cwd
map ctrl+a>n  					next_tab
map ctrl+a>p  					previous_tab
map ctrl+a>x  					close_window
map ctrl+a>shift+x  		close_tab
map ctrl+a>r  					set_tab_title
map ctrl+a>e  					goto_tab -1
map ctrl+a>shift+left   move_tab_backward
map ctrl+a>shift+right  move_tab_forward

map ctrl+a>1  goto_tab 1
map ctrl+a>2  goto_tab 2
map ctrl+a>3  goto_tab 3
map ctrl+a>4  goto_tab 4
map ctrl+a>5  goto_tab 5
map ctrl+a>6  goto_tab 6
map ctrl+a>7  goto_tab 7
map ctrl+a>8  goto_tab 9
map ctrl+a>9  goto_tab 9
map ctrl+a>0  goto_tab 10

map cmd+1  			goto_tab 1
map cmd+2  			goto_tab 2
map cmd+3  			goto_tab 3
map cmd+4  			goto_tab 4
map cmd+5  			goto_tab 5
map cmd+6  			goto_tab 6
map cmd+7  			goto_tab 7
map cmd+8  			goto_tab 8
map cmd+9 			goto_tab 9
map cmd+left   	previous_tab
map cmd+right  	next_tab
map cmd+t 			new_tab_with_cwd

# Splits
map ctrl+a>s  launch --location=hsplit --cwd=current
map ctrl+a>v  launch --location=vsplit --cwd=current

# Navigate splits
map ctrl+h neighboring_window left
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+l neighboring_window right
map --when-focus-on var:IS_VIM=true ctrl+h
map --when-focus-on var:IS_VIM=true ctrl+j
map --when-focus-on var:IS_VIM=true ctrl+k
map --when-focus-on var:IS_VIM=true ctrl+l

# Resize splits
map ctrl+a>shift+h  resize_window narrower 5
map ctrl+a>shift+j  resize_window shorter 5
map ctrl+a>shift+k  resize_window taller 5
map ctrl+a>shift+l  resize_window wider 5

# Send literal ctrl+a
map ctrl+a>a  send_key ctrl+a

# Clear window
map ctrl+a>l  send_key ctrl+l
