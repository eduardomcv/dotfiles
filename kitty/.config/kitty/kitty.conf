include keymaps.conf
include ${KITTY_OS}.conf

shell /bin/zsh
shell_integration enabled
allow_remote_control yes

font_size        16.0
font_family      family=Iosevka style=Regular
bold_font        auto
italic_font      auto
bold_italic_font auto

symbol_map U+e000-U+e00a,U+e0a0-U+e0a2,U+e0a3,U+e0b0-U+e0b3,U+e0b4-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b7,U+e700-U+e8ef,U+ea60-U+ec1e,U+ed00-U+efce,U+f000-U+f2ff,U+f300-U+f381,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono

enabled_layouts 				splits,stack
tab_bar_style 					fade
tab_fade 								0.5 1
cursor_shape           	block
cursor_blink_interval  	0
enable_audio_bell 			no
wheel_scroll_multiplier 0.95

initial_window_width  	130c
initial_window_height 	40c
hide_window_decorations no
confirm_os_window_close 0

# Unmap defaults that conflict with neovim
map ctrl+p
map ctrl+n
