// This is a logid configuration specific for KDE and the MX Master 3.
// For other desktop environments and devices, key combinations and device names/gestures will vary.
devices: (
{
    name: "Wireless Mouse MX Master 3";

    smartshift: { 
	on: true; 
	threshold: 20; 
    };

    hiresscroll: {
        hires: true;
        invert: false;
        target: false;
    };

    buttons: (
        // Thumb Button (Gesture Button)
        {
            cid: 0xc3;
            action = {
                type: "Gestures";
                gestures: (
                    {
                        direction: "None";
                        mode: "OnRelease";
                        action = {
                            type: "Keypress";
                            keys: ["KEY_LEFTMETA", "KEY_W"];
                        };
                    },
                    {
                        direction: "Left";
                        mode: "OnRelease";
                        action = { 
                            type: "Keypress";
                            keys: ["KEY_LEFTCTRL", "KEY_LEFTMETA", "KEY_LEFT"];
                        };
                    },
                    {
                        direction: "Right";
                        mode: "OnRelease";
                        action = {
                            type: "Keypress";
                            keys: ["KEY_LEFTCTRL", "KEY_LEFTMETA", "KEY_RIGHT"];
                        };
                    }
                );
            };
        },

        // Top Button (Middle small button) - Manual Mode Shift
        {
            cid: 0xc4;
            action = { 
                type: "ToggleSmartShift";
            };
        }
    );

    // Thumb Wheel - Horizontal Scrolling
    thumbwheel: {
        divert: false;
        invert: false;
    };
}
);
